<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | StickerSwap Album</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <header class="auth-header">
        <a class="brand" href="index.html">
          <div class="brand-mark">SS</div>
          <div>
            <strong>StickerSwap</strong>
            <span>Panini collector hub</span>
          </div>
        </a>
        <a class="secondary-action" href="index.html">Back to app</a>
      </header>

      <section class="auth-panel">
        <p class="eyebrow">Account access</p>
        <h1>Login</h1>
        <form id="loginForm">
          <label>
            Email
            <input name="email" type="email" required autocomplete="email" />
          </label>
          <label>
            Password
            <input name="password" type="password" required autocomplete="current-password" />
          </label>
          <button type="submit">Login</button>
          <p class="form-status" id="loginStatus" role="status"></p>
        </form>
        <p class="auth-note">Need an account? <a href="signup.html">Create one</a></p>
        <p class="auth-note"><a href="forgot-password.html">Forgot password?</a></p>
      </section>
    </main>
    <script src="auth.js"></script>
  </body>
</html>
