<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recover Account | StickerSwap Album</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <header class="auth-header">
        <a class="brand" href="index.html">
          <div class="brand-mark">SS</div>
          <div>
            <strong>StickerSwap</strong>
            <span>Panini collector hub</span>
          </div>
        </a>
        <a class="secondary-action" href="login.html">Login</a>
      </header>

      <section class="auth-panel">
        <p class="eyebrow">Account recovery</p>
        <h1>Recover password</h1>
        <form id="forgotForm">
          <label>
            Email
            <input name="email" type="email" required autocomplete="email" />
          </label>
          <button type="submit">Prepare reset link</button>
          <p class="form-status" id="forgotStatus" role="status"></p>
        </form>
        <p class="auth-note">This prototype shows the reset link on screen instead of sending email.</p>
      </section>
    </main>
    <script src="auth.js"></script>
  </body>
</html>
